name: Build and Release

on:
  push:
    tags:
      - 'v*'  # Triggers on version tags like v1.0.0, v1.1.0, etc.
  workflow_dispatch:  # Allows manual triggering

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest
        
    - name: Install dependencies
      run: bun install --frozen-lockfile
      
    - name: Build application
      run: bun run build
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
    - name: List build artifacts
      run: |
        echo "Build artifacts:"
        Get-ChildItem -Path "release" -Recurse
        
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          release/*/Arena Tracker-Windows-*-Setup.exe
          release/*/Arena Tracker-Windows-*-Portable.exe
          release/*/latest.yml
          release/*/*.blockmap
        generate_release_notes: true
        draft: false
        prerelease: false
        body: |
          ## Arena Tracker ${{ github.ref_name }}
          
          ### Downloads
          - **Installer**: Arena Tracker-Windows-*-Setup.exe (Recommended for most users)
          - **Portable**: Arena Tracker-Windows-*-Portable.exe (No installation required)
          
          ### Installation
          1. **Installer**: Download and run the Setup.exe file
          2. **Portable**: Download and extract the Portable.exe file anywhere
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
